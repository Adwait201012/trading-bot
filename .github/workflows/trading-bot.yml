name: Indian Stock Market Trading Bot

on:
  schedule:
    - cron: '45 3 * * 1-5'   # 9:15 AM IST  - Market Open
    - cron: '15 4 * * 1-5'   # 9:45 AM IST
    - cron: '45 4 * * 1-5'   # 10:15 AM IST
    - cron: '15 5 * * 1-5'   # 10:45 AM IST
    - cron: '45 5 * * 1-5'   # 11:15 AM IST
    - cron: '15 6 * * 1-5'   # 11:45 AM IST
    - cron: '45 6 * * 1-5'   # 12:15 PM IST
    - cron: '15 7 * * 1-5'   # 12:45 PM IST
    - cron: '45 7 * * 1-5'   # 1:15 PM IST
    - cron: '15 8 * * 1-5'   # 1:45 PM IST
    - cron: '45 8 * * 1-5'   # 2:15 PM IST
    - cron: '15 9 * * 1-5'   # 2:45 PM IST
    - cron: '45 9 * * 1-5'   # 3:15 PM IST  - Near Market Close
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot scan
        run: python main.py --once

      - name: Generate portfolio report
        run: python generate_report.py

      - name: Commit updated portfolio & report
        run: |
          git config user.email "trading-bot@github.com"
          git config user.name "Trading Bot"
          mkdir -p logs
          git add -f logs/ REPORT.md
          git diff --staged --quiet || git commit -m "📊 Portfolio update - $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')"
          git push
